<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab_3</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="ex_1, ex">
    <h1> Завдання 1</h1>
    <p> Уведіть число суму яких треба додати від 1 до заданого </p>
    <input class="sum" type="number" placeholder="Уведіть число">
    <button onclick="calculateSum()" id="button" role="button" class="btn"> Обчислити </button>
  </div>

  <div class="ex_2, ex">
    <h1> Завдання 2</h1>
    <p> Обчислити факторіал числа </p>
    <input class="factorial" type="number" placeholder="Уведіть число">
    <button onclick="calculateFactorial()" id="button" role="button" class="btn"> Обчислити </button>
  </div>

  <div class="ex_3, ex">
    <h1> Завдання 3</h1>
    <p> Знайти місяць по числу </p>
    <input class="month" type="number" placeholder="Уведіть число">
    <button onclick="calculateMonth()" id="button" role="button" class="btn"> Обчислити </button>
  </div>


  <div class="ex_4, ex">
    <h1> Завдання 4</h1>
    <p> Сума всіх парних чисел масиву </p>
    <input class="masive" type="number" placeholder="Уведіть число">
    <button class="btn" onclick="AddElementToMasive()"> Додати елемент до масиву </button>
    <p class="output"></p>
    <button class="btn" onclick="calculateSumMasive()"> Порахувати суму парних чисел </button>
    <p class="sumResult"></p>
  </div>

  <div class="ex_5, ex">
    <h1> Завдання 5</h1>
    <p> Кількість голосних літер </p>
    <input class="text" type="text" placeholder="Уведіть число">
    <button class="btn" onclick="calculatelater()" > Обчислити </button>
  </div>

  <div class="ex_6, ex">
    <h1>Завдання 6</h1>
    <p>Звести число в степінь</p>
    <input class="number_1" type="number" placeholder="Уведіть число">
    <input class="number_2" type="number" placeholder="Уведіть степінь">
    <button class="btn" onclick="calculatePower()" >Обчислити</button>

  </div>








  <script src="variant_1-8_ex1.js"> </script>

</html>
